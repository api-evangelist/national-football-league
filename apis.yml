aid: national-football-league
name: National Football League
description: >-
  The National Football League (NFL) is the premier professional American
  football league, comprised of 32 franchises divided between the AFC and NFC
  conferences. The NFL produces the Super Bowl and is the most-watched
  sports league in the United States. The league does not operate a public
  developer portal; statistical and play-by-play data feeds are licensed to
  partners (notably AWS, Amazon Web Services Next Gen Stats, Sportradar, and
  Genius Sports) and are not offered as a self-serve developer API.
